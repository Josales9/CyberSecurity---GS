name: Mission Clear - DevSecOps Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-test:
    name: Security Scan and Test Execution
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Dependency Vulnerability Check
      run: dotnet list package --vulnerable

    - name: Execute Security Tests & Core Engine Tests
      env:
        MYSQL_CONNECTION: ${{ secrets.MYSQL_PRODUCTION_CONNECTION }}
        JWT_SECRET_KEY: ${{ secrets.JWT_PRODUCTION_SECRET }}
      run: dotnet test --configuration Release --property:NugetAudit=false
